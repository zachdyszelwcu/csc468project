name: YOLOv8 CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-push:
    name: Build and push images to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Flask backend image
        uses: docker/build-push-action@v6
        with:
          context: ./yolov8
          file: ./yolov8/Dockerfile
          push: true
          tags: zd991845/yolov8-flask:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: zd991845/yolov8-frontend:latest

  deploy:
    name: Deploy updated stack on CloudLab
    needs: build-push
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull latest images
        run: docker compose pull

      - name: Restart containers
        run: docker compose up -d

      - name: Show running containers
        run: docker ps

      - name: Clean up old unused images
        run: docker image prune -f
