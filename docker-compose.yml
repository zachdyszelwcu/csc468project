version: '3.8'

services:
  flask:
    build: ./yolov8
    ports:
      - "5002:5002"
    depends_on:
      - minio
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "8081:3000"
    depends_on:
      - flask
    restart: always

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: zachminioadmin
      MINIO_ROOT_PASSWORD: zachminioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always


volumes:
  minio_data: