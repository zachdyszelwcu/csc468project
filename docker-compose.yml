version: "3.8"

services:
  flask:
    image: zd991845/yolov8-flask:latest
    build:
      context: ./yolov8
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    restart: always

    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: "1.5"

  frontend:
    image: zd991845/yolov8-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8081:3000"
    depends_on:
      - flask
    restart: always

    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: "0.5"
