<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YoloV8 Demo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>

<div class="head">
    <h1 class="Title">YoloV8 Demo</h1>
</div>

<div class="buttons">
    <button id="cameraBtn">
        <span class="material-symbols-outlined">gallery_thumbnail</span>
        <span class="btnTitle">Gallery</span>
    </button>

    <label for="file-upload" class="custom-file-upload">
        <span class="material-symbols-outlined">add</span>
        Upload Photo
    </label>

    <input id="file-upload" type="file" accept=".jpg, .jpeg, .png" hidden />
</div>

<script src="yolo.js"></script>

</body>
</html>
