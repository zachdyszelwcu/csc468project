<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="head">
    <h1 class="Title"></h1>
</div>

<img id="preview" />

<div class="buttons">
    <button id="backBtn">Back</button>
    <button id="saveBtn">Save to Gallery</button>
</div>

<script>
const img = document.getElementById("preview");
const stored = localStorage.getItem("uploadedImage");
const saveBtn = document.getElementById("saveBtn");

saveBtn.disabled = true;

if (stored) {
    img.src = stored;

    fetch(stored)
        .then(res => res.blob())
        .then(async (blob) => {

            const formData = new FormData();
            formData.append("image", blob, "upload.jpg");

            const response = await fetch("http://localhost:5002/detect", {
                method: "POST",
                body: formData
            });

            const resultBlob = await response.blob();
            const resultURL = URL.createObjectURL(resultBlob);

            img.src = resultURL;
            saveBtn.disabled = false;
        });
}

saveBtn.addEventListener("click", async () => {
    try {
        const res = await fetch("http://localhost:5002/save", {
            method: "POST"
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.error || "Save failed");
        } else {
            alert(data.message);
        }

    } catch {
        alert("Server error");
    }
});
</script>

<script src="yolo.js"></script>

</body>
</html>
